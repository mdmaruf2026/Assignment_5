<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>Assignment5</title>

    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Inter", sans-serif;
        }
    </style>

</head>

<body>
    <header>

        <!-- navbar Section -->
        <section class="navbarSection">
        <div class="navbar bg-base-100 shadow-sm pl-20 pr-20">
        <div class="navbar-start">
        <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
        </div>
            <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li><a>Item 1</a></li>
            <li>
            <a>Parent</a>
            <ul class="p-2">
            <li><a>Submenu 1</a></li>
            <li><a>Submenu 2</a></li>
            </ul>
            </li>
            <li><a>Item 3</a></li>
            </ul>
        </div>

            <!-- navbar left size -->
            <a class="btn btn-ghost text-xl">
                <img src="assets/github-logo.png" alt="" class="w-[36px] h-[37px]">
                GitHub Issues Tracker</a>
            </div>
            <!-- navbar right size -->
         <div class="navbar-end hidden lg:flex gap-[10px]">
            <form class="flex items-center gap-[16px]">         
                <div class="search relative flex items-center ">
                    <i class="fa-brands fa-sistrix absolute left-3"></i> 
                    <input type="text" placeholder= "Search issues..." class="rounded-sm pl-10 align-middle"> 
                </div>
                <button class="bg-purple-600 text-white px-[16px] py-[12px] rounded-sm flex-auto"> Search
                </button>
                </form>       
        </div>
        </div>
         </section>
        
         <!-- header button Section -->
        <section class="headerBtn">
        <div class="header_bar mt-[60px] w-[120px] h-[40px] text-base flex gap-[8px] mx-[245px] mb-[16px]">
            <!-- buttonName All -->
            <button id="allBtn" onclick="toggle('allBtn')" class="text-[#FFFFFF] bg-[#4A00FF] font-semibold px-[50px] py-[8px] rounded-sm">All</button>
            <!-- buttonName Open -->
            <button id="openBtn" onclick="toggle('openBtn')" class="text-[#64748B] font-medium  rounded-sm border px-[40px] py-[8px]">Open</button>
            <!-- buttonName Closed -->
            <button id="closedBtn" onclick="toggle('closedBtn')" class="text-[#64748B] font-medium  rounded-sm border px-[40px] py-[8px]">Closed</button>
        </div>
        </section>
    </header>

        <!-- main section start -->
        <main class="px-[245px]">
        
        <!-- main Header Section -->
        <section class="mainHeader">
            <div class="mainHeaderPart flex gap-[8px] mb-6">
            <div class="mainHeaderImg">
                <img src="assets/Aperture.png" alt="" class="w-[50px] h-[50px]">
            </div>
            <div class="mainHeaderTextLeft flex-1 ">
                <p class="font-semibold text-[#1F2937] text-xl" >50 Issues</p>
                <p class="font-normal text-[#64748B] text-base">Track and manage your project issues</p>
            </div>
            <div class="mainHeaderTextRight flex gap-4 text-base text-[#1F2937] font-medium justify-between">
                <button class="">
                    <span class="w-3 h-3 text-[#00A96E]"><i class="fa-solid fa-circle"></i>
                    </span>
                    Open
                </button>
                <button class="">
                    <span class="w-3 h-3 text-[#A855F7]"><i class="fa-solid fa-circle"></i>
                    </span>
                    closed
                </button>
            </div>
            </div>
        </section>

        <!-- main Issues Card -->
         <section class="mainIssuesCard">   
            
            <!-- issues Card Container -->
         <div id="issuesContainer" class="w-full h-[400px] grid grid-cols-4 gap-6 mt-8">   
         </div>
         </section>

         <!-- Loading spinner -->
          <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-spinner loading-xl"></span>
          </div>
    </main> 
    <script src="javascript/issues.js"></script>
</body>
</html>
